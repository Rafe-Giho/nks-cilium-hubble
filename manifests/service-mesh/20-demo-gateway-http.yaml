apiVersion: v1
kind: Namespace
metadata:
  name: cilium-service-mesh-demo
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: web-v1-content
  namespace: cilium-service-mesh-demo
data:
  index.html: |
    cilium-service-mesh-demo v1
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: web-v2-content
  namespace: cilium-service-mesh-demo
data:
  index.html: |
    cilium-service-mesh-demo v2
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: web-v1
  namespace: cilium-service-mesh-demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: web
      version: v1
  template:
    metadata:
      labels:
        app: web
        version: v1
    spec:
      containers:
        - name: web
          image: nginx:1.27-alpine
          ports:
            - name: http
              containerPort: 80
          volumeMounts:
            - name: content
              mountPath: /usr/share/nginx/html/index.html
              subPath: index.html
      volumes:
        - name: content
          configMap:
            name: web-v1-content
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: web-v2
  namespace: cilium-service-mesh-demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: web
      version: v2
  template:
    metadata:
      labels:
        app: web
        version: v2
    spec:
      containers:
        - name: web
          image: nginx:1.27-alpine
          ports:
            - name: http
              containerPort: 80
          volumeMounts:
            - name: content
              mountPath: /usr/share/nginx/html/index.html
              subPath: index.html
      volumes:
        - name: content
          configMap:
            name: web-v2-content
---
apiVersion: v1
kind: Service
metadata:
  name: web
  namespace: cilium-service-mesh-demo
spec:
  selector:
    app: web
  ports:
    - name: http
      port: 80
      targetPort: http
---
apiVersion: v1
kind: Service
metadata:
  name: web-v1
  namespace: cilium-service-mesh-demo
spec:
  selector:
    app: web
    version: v1
  ports:
    - name: http
      port: 80
      targetPort: http
---
apiVersion: v1
kind: Service
metadata:
  name: web-v2
  namespace: cilium-service-mesh-demo
spec:
  selector:
    app: web
    version: v2
  ports:
    - name: http
      port: 80
      targetPort: http
---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: mesh-gateway
  namespace: cilium-service-mesh-demo
spec:
  gatewayClassName: cilium
  listeners:
    - name: http
      protocol: HTTP
      port: 80
      hostname: mesh-demo.example
      allowedRoutes:
        namespaces:
          from: Same
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: web-route
  namespace: cilium-service-mesh-demo
spec:
  parentRefs:
    - name: mesh-gateway
  hostnames:
    - mesh-demo.example
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: web-v1
          port: 80
          weight: 90
        - name: web-v2
          port: 80
          weight: 10
